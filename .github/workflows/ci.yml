name: CI
on:
  push:
    branches: [main, claude/**]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Type check (strict modules)
        run: npx tsc --noEmit -p tsconfig.strict.json
      - name: Tests
        run: npx vitest run
      - name: Confidence gate
        run: npm run confidence-gate
        env:
          CONFIDENCE_MIN: 60
